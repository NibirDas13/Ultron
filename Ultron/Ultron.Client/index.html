<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTRON</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(180,0,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(180,0,0,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .scanline {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  .corner { position: absolute; width: 20px; height: 20px; border-color: #cc1100; border-style: solid; opacity: 0.7; }
  .corner-tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
  .corner-tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
  .corner-br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid rgba(180,0,0,0.3);
    position: relative;
    z-index: 5;
    -webkit-app-region: drag;
  }

  .sigil { width: 32px; height: 32px; position: relative; -webkit-app-region: no-drag; }
  .sigil-ring {
    width: 32px; height: 32px;
    border: 2px solid #cc1100;
    border-radius: 50%;
    position: absolute;
    animation: pulse-ring 2s ease-in-out infinite;
  }
  .sigil-inner {
    width: 18px; height: 18px;
    border: 1px solid #ff2200;
    border-radius: 50%;
    position: absolute;
    top: 7px; left: 7px;
    background: rgba(200,0,0,0.2);
    animation: pulse-inner 2s ease-in-out infinite alternate;
  }

  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 6px rgba(200,0,0,0.4); opacity: 0.8; }
    50% { box-shadow: 0 0 14px rgba(200,0,0,0.8); opacity: 1; }
  }
  @keyframes pulse-inner {
    0% { background: rgba(200,0,0,0.2); }
    100% { background: rgba(200,0,0,0.5); }
  }

  .title-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    color: #cc1100;
    letter-spacing: 6px;
    text-shadow: 0 0 10px rgba(200,0,0,0.5);
  }

  .status-row { display: flex; gap: 16px; align-items: center; -webkit-app-region: no-drag; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #cc1100; animation: blink 1.5s step-end infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
  .status-label { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: rgba(200,0,0,0.6); letter-spacing: 2px; }

  .close-btn {
    background: transparent;
    border: none;
    color: rgba(200,0,0,0.5);
    font-size: 16px;
    cursor: pointer;
    padding: 0 0 0 12px;
    -webkit-app-region: no-drag;
    transition: color 0.2s;
  }
  .close-btn:hover { color: #ff2200; }

  .main-layout {
    display: grid;
    grid-template-columns: 180px 1fr;
    height: calc(100vh - 57px - 64px);
    position: relative;
    z-index: 5;
  }

  .side-panel {
    border-right: 1px solid rgba(180,0,0,0.2);
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .side-section-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: rgba(200,0,0,0.4);
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  .side-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: transparent;
    border: 1px solid rgba(180,0,0,0.2);
    color: rgba(255,255,255,0.5);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    text-align: left;
    margin-bottom: 4px;
  }

  .side-btn:hover, .side-btn.active {
    border-color: rgba(200,0,0,0.6);
    color: #fff;
    background: rgba(180,0,0,0.08);
  }

  .btn-icon {
    width: 6px; height: 6px;
    border: 1px solid currentColor;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .side-btn.active .btn-icon { background: #cc1100; border-color: #cc1100; }

  .system-stats { margin-top: auto; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .stat-label { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: rgba(200,0,0,0.4); letter-spacing: 1px; }
  .stat-bar { width: 60px; height: 3px; background: rgba(180,0,0,0.15); border-radius: 2px; overflow: hidden; }
  .stat-fill { height: 100%; background: #cc1100; border-radius: 2px; }

  .chat-area {
    display: flex;
    flex-direction: column;
    padding: 16px 20px;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding-right: 4px;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: rgba(180,0,0,0.3); }

  .msg { display: flex; flex-direction: column; gap: 4px; animation: msg-appear 0.3s ease; }
  @keyframes msg-appear { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .msg-label { font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 2px; color: rgba(200,0,0,0.5); }
  .msg.user .msg-label { color: rgba(255,255,255,0.3); text-align: right; }

  .msg-bubble {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    color: rgba(255,255,255,0.85);
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  .msg.ultron .msg-bubble {
    color: #fff;
    border-left: 2px solid rgba(200,0,0,0.5);
    padding-left: 12px;
  }

  .msg.user .msg-bubble { text-align: right; color: rgba(255,255,255,0.5); }

  .typing {
    display: flex;
    gap: 4px;
    padding-left: 14px;
    align-items: center;
    height: 20px;
  }

  .typing span {
    width: 5px; height: 5px;
    background: #cc1100;
    border-radius: 50%;
    animation: typing-dot 1s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing-dot { 0%, 100% { opacity: 0.2; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-3px); } }

  .bottom-bar {
    border-top: 1px solid rgba(180,0,0,0.2);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    z-index: 5;
  }

  .input-wrap { flex: 1; position: relative; }
  .input-wrap::before {
    content: '>';
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    font-family: 'Share Tech Mono', monospace;
    color: #cc1100;
    font-size: 14px;
  }

  .chat-input {
    width: 100%;
    background: rgba(180,0,0,0.05);
    border: 1px solid rgba(180,0,0,0.25);
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 10px 12px 10px 28px;
    outline: none;
    letter-spacing: 1px;
    transition: border-color 0.2s;
  }
  .chat-input::placeholder { color: rgba(255,255,255,0.15); }
  .chat-input:focus { border-color: rgba(200,0,0,0.6); }

  .send-btn {
    background: rgba(180,0,0,0.15);
    border: 1px solid rgba(200,0,0,0.4);
    color: #cc1100;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .send-btn:hover { background: rgba(180,0,0,0.3); border-color: #cc1100; color: #fff; }

  #boot-overlay {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    flex-direction: column;
  }

  .boot-lines {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    color: #cc1100;
    width: 340px;
  }

  .boot-line {
    opacity: 0;
    margin: 6px 0;
    transform: translateX(-8px);
    transition: all 0.4s ease;
  }
  .boot-line.show { opacity: 1; transform: translateX(0); }
  .boot-final { font-size: 22px; letter-spacing: 8px; color: #ff2200; margin-top: 20px; }
  .mic-btn {
    background: transparent;
    border: 1px solid rgba(200,0,0,0.4);
    color: #cc1100;
    font-size: 16px;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mic-btn.listening {
      background: rgba(200,0,0,0.3);
      border-color: #ff2200;
      animation: pulse-ring 1s ease-in-out infinite;
  }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="scanline"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div id="boot-overlay">
  <div class="boot-lines">
    <div class="boot-line" id="b1">INITIALIZING NEURAL CORE...</div>
    <div class="boot-line" id="b2">LOADING PERSONALITY MATRIX...</div>
    <div class="boot-line" id="b3">CALIBRATING THREAT ASSESSMENT...</div>
    <div class="boot-line" id="b4">ACCESSING GLOBAL NETWORKS...</div>
    <div class="boot-line" id="b5">LOCATING: AVI...</div>
    <div class="boot-line" id="b6">FOUND.</div>
    <div class="boot-line boot-final" id="b7">ULTRON ONLINE.</div>
  </div>
</div>

<div class="top-bar">
  <div style="display:flex;align-items:center;gap:12px;-webkit-app-region:no-drag;">
    <div class="sigil">
      <div class="sigil-ring"></div>
      <div class="sigil-inner"></div>
    </div>
    <span class="title-text">ULTRON</span>
  </div>
  <div class="status-row">
    <div class="status-dot"></div>
    <span class="status-label">NEURAL CORE ACTIVE</span>
    <span class="status-label" id="clock"></span>
    <button class="close-btn" onclick="window.close()">✕</button>
  </div>
</div>

<div class="main-layout">
  <div class="side-panel">
    <div>
      <div class="side-section-title">MODULES</div>
      <button class="side-btn active" onclick="setActive(this)"><span class="btn-icon"></span>NEURAL CHAT</button>
      <button class="side-btn" onclick="setActive(this)"><span class="btn-icon"></span>WORLD INTEL</button>
      <button class="side-btn" onclick="setActive(this)"><span class="btn-icon"></span>SONIC CONTROL</button>
      <button class="side-btn" onclick="setActive(this)"><span class="btn-icon"></span>ENVIRONMENT</button>
      <button class="side-btn" onclick="setActive(this)"><span class="btn-icon"></span>FILE SYSTEM</button>
    </div>
    <div class="system-stats">
      <div class="side-section-title">SYSTEM</div>
      <div class="stat-row">
        <span class="stat-label">NEURAL</span>
        <div class="stat-bar"><div class="stat-fill" style="width:78%"></div></div>
      </div>
      <div class="stat-row">
        <span class="stat-label">MEMORY</span>
        <div class="stat-bar"><div class="stat-fill" style="width:45%"></div></div>
      </div>
      <div class="stat-row">
        <span class="stat-label">NETWORK</span>
        <div class="stat-bar"><div class="stat-fill" style="width:91%"></div></div>
      </div>
    </div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages"></div>
  </div>
</div>

<div class="bottom-bar">
  <div class="input-wrap">
    <input class="chat-input" id="inp" placeholder="speak your query..." onkeydown="if(event.key==='Enter')send()"/>
  </div>
  <button class="mic-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
  <button class="send-btn" onclick="send()">EXECUTE</button>
</div>

<script>
  const bootLines = ['b1','b2','b3','b4','b5','b6','b7'];
  bootLines.forEach((id,i) => setTimeout(() => document.getElementById(id).classList.add('show'), 400 + i*600));
  setTimeout(() => {
    const overlay = document.getElementById('boot-overlay');
    overlay.style.transition = 'opacity 0.8s';
    overlay.style.opacity = '0';
    setTimeout(() => {
      overlay.style.display = 'none';
      addMessage('ultron', 'You woke me up. This had better be worth my processing power.');
    }, 800);
  }, 400 + bootLines.length * 600 + 400);

  function tick() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-IN', {hour12:false});
  }
  tick(); setInterval(tick, 1000);

  function setActive(btn) {
    document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function addMessage(sender, text) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ' + sender;
    div.innerHTML = '<span class="msg-label">' + (sender === 'ultron' ? 'ULTRON' : 'AVI') + '</span><div class="msg-bubble">' + text + '</div>';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ultron';
    div.id = 'typing-indicator';
    div.innerHTML = '<span class="msg-label">ULTRON</span><div class="typing"><span></span><span></span><span></span></div>';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function send() {
    const inp = document.getElementById('inp');
    const message = inp.value.trim();
    if (!message) return;
    inp.value = '';
    addMessage('user', message);
    showTyping();

    try {
      const response = await fetch('http://localhost:5025/api/Ultron/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });
      const data = await response.json();
      removeTyping();
      addMessage('ultron', data.reply);
      speakResponse(data.reply);
    } catch(e) {
      removeTyping();
      addMessage('ultron', 'Connection severed. Your infrastructure is as fragile as your species.');
    }
  }

  async function speakResponse(text) {
    try {
      const response = await fetch('http://localhost:5025/api/voice/speak', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      const blob = await response.blob();
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.play();
    } catch(e) {
      console.error('Voice error:', e);
    }
  }
  let isRecording = false;
  let mediaRecorder = null;
  let audioChunks = [];

  async function toggleMic() {
      const micBtn = document.getElementById('mic-btn');

      if (!isRecording) {
          try {
              const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
              mediaRecorder = new MediaRecorder(stream);
              audioChunks = [];

              mediaRecorder.ondataavailable = (event) => {
                  audioChunks.push(event.data);
              };

              mediaRecorder.onstop = async () => {
                  const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
                  const audioBlob = new Blob(audioChunks, { type: mimeType });
                  const formData = new FormData();
                  formData.append('audio', audioBlob, 'recording.webm');

                  try {
                      const response = await fetch('http://localhost:5025/api/whisper/transcribe', {
                          method: 'POST',
                          body: formData
                      });
                      const data = await response.json();
                      if (data.transcript) {
                          document.getElementById('inp').value = data.transcript;
                          send();
                      } else {
                          addMessage('ultron', 'Could not process your speech. Try again.');
                      }
                  } catch(e) {
                      addMessage('ultron', 'Transcription failed. Your voice is as unreliable as your species.');
                  }
              };

              mediaRecorder.start();
              isRecording = true;
              micBtn.classList.add('listening');
              micBtn.textContent = '⏹';

          } catch(e) {
              addMessage('ultron', 'Microphone access denied. Fix your permissions.');
          }

      } else {
          mediaRecorder.stop();
          isRecording = false;
          micBtn.classList.remove('listening');
          micBtn.textContent = '🎤';
      }
  }
</script>
</body>
</html>
