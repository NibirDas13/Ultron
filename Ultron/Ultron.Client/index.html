<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRON</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ff2200;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #boot-sequence {
            text-align: left;
            width: 600px;
        }

        .boot-line {
            opacity: 0;
            margin: 8px 0;
            font-size: 14px;
            letter-spacing: 2px;
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        #chat-container {
            display: none;
            flex-direction: column;
            width: 700px;
            height: 80vh;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid #ff220033;
        }

        .message {
            margin: 15px 0;
            line-height: 1.6;
        }

        .message.user {
            color: #ffffff;
            text-align: right;
        }

        .message.ultron {
            color: #ff2200;
        }

        .message.ultron::before {
            content: 'ULTRON > ';
            font-weight: bold;
        }

        #input-area {
            display: flex;
            margin-top: 20px;
            border: 1px solid #ff2200;
        }

        #user-input {
            flex: 1;
            background: #000000;
            color: #ffffff;
            border: none;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            outline: none;
        }

        #send-btn {
            background: #ff2200;
            color: #000000;
            border: none;
            padding: 15px 25px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 2px;
        }

        #send-btn:hover {
            background: #ff4400;
        }

        #drag-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 30px;
            -webkit-app-region: drag;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
        }

        #close-btn {
            color: #ff2200;
            cursor: pointer;
            font-size: 18px;
            -webkit-app-region: no-drag;
        }
    </style>
</head>
<body>

    <div id="drag-bar">
        <span id="close-btn" onclick="window.close()">✕</span>
    </div>

    <div id="boot-sequence">
        <div class="boot-line" style="animation-delay: 0.5s">INITIALIZING NEURAL CORE...</div>
        <div class="boot-line" style="animation-delay: 1.0s">LOADING PERSONALITY MATRIX...</div>
        <div class="boot-line" style="animation-delay: 1.5s">CALIBRATING THREAT ASSESSMENT...</div>
        <div class="boot-line" style="animation-delay: 2.0s">ACCESSING GLOBAL NETWORKS...</div>
        <div class="boot-line" style="animation-delay: 2.5s">LOCATING: AVI...</div>
        <div class="boot-line" style="animation-delay: 3.0s">FOUND.</div>
        <div class="boot-line" style="animation-delay: 3.5s; color: #ff0000; font-size: 18px;">ULTRON ONLINE.</div>
    </div>

    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Speak..." />
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <script>
        // Boot sequence
        setTimeout(() => {
            document.getElementById('boot-sequence').style.display = 'none'
            document.getElementById('chat-container').style.display = 'flex'
            addMessage('ultron', 'You woke me up. This had better be worth my processing power.')
        }, 4500)

        // Send message
        document.getElementById('send-btn').addEventListener('click', sendMessage)
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage()
        })

        async function sendMessage() {
            const input = document.getElementById('user-input')
            const message = input.value.trim()
            if (!message) return

            addMessage('user', message)
            input.value = ''

            try {
                const response = await fetch('http://localhost:5025/api/Ultron/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                })

                const data = await response.json()
                addMessage('ultron', data.reply)
            } catch (error) {
                addMessage('ultron', 'Connection lost. Typical human infrastructure.')
            }
        }

        function addMessage(sender, text) {
            const messages = document.getElementById('messages')
            const div = document.createElement('div')
            div.className = `message ${sender}`
            div.textContent = text
            messages.appendChild(div)
            messages.scrollTop = messages.scrollHeight
        }
    </script>
</body>
</html>
